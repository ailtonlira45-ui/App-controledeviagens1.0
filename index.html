<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS - VIANORTESUL - Sistema de Controle de Viagens</title>
    <style>
        :root {
            --primary: #666666;
            --primary-dark: #444444;
            --primary-light: #888888;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

        body {
            min-height:100vh;
            background:#0a0a0a;
            color:#fff;
            overflow-x:hidden;
        }

        .animated-bg {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 25%, #404040 50%, #2d2d2d 75%, #1a1a1a 100%);
            background-size: 400% 400%;
            z-index:-2;
            animation: gradientShift 10s ease infinite;
        }

        .bg-particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        .particle {
            position:absolute; border-radius:50%;
            background: rgba(255,255,255,0.03);
            animation: float 20s infinite;
        }
        .ns-watermark {
            position:fixed; font-size:12vw; font-weight:900;
            color: rgba(255,255,255,0.015); top:50%; left:50%;
            transform: translate(-50%,-50%); letter-spacing:15px;
            pointer-events:none; z-index:-1;
            text-shadow: 0 0 80px rgba(150,150,150,0.08);
            white-space: nowrap;
        }

        @keyframes gradientShift {
            0% { background-position:0% 50%; }
            50% { background-position:100% 50%; }
            100% { background-position:0% 50%; }
        }
        @keyframes float {
            0%,100% { transform:translateY(0) translateX(0) scale(1); opacity:0.3; }
            25% { transform:translateY(-100px) translateX(50px) scale(1.5); opacity:0.1; }
            50% { transform:translateY(-50px) translateX(-30px) scale(0.8); opacity:0.2; }
            75% { transform:translateY(-150px) translateX(20px) scale(1.2); opacity:0.05; }
        }

        .header {
            background: rgba(0,0,0,0.7); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); padding:0 25px;
            position:sticky; top:0; z-index:100;
            border-bottom:1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .nav {
            display:flex; justify-content:space-between; align-items:center;
            max-width:1400px; margin:0 auto; height:65px;
        }
        .logo {
            font-size:1.6rem; font-weight:900; letter-spacing:3px;
            background: linear-gradient(135deg,#fff 0%,#aaa 50%,#666 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            cursor:pointer; filter: drop-shadow(0 0 15px rgba(180,180,180,0.3));
            transition:0.3s;
        }
        .logo:hover { filter: drop-shadow(0 0 25px rgba(200,200,200,0.5)); transform:scale(1.05); }
        .menu { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .menu-btn {
            background: rgba(255,255,255,0.04); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.1);
            color:#fff; padding:9px 18px; border-radius:10px; cursor:pointer;
            transition:0.3s; font-weight:500; white-space:nowrap; font-size:0.85rem;
            letter-spacing:0.5px;
        }
        .menu-btn:hover {
            background: rgba(150,150,150,0.2); border-color: rgba(150,150,150,0.4);
            transform:translateY(-2px); box-shadow: 0 8px 25px rgba(100,100,100,0.15);
        }
        .menu-btn.active {
            background: rgba(150,150,150,0.3); border-color: var(--primary);
            box-shadow: 0 0 20px rgba(100,100,100,0.3), inset 0 0 20px rgba(100,100,100,0.1);
        }
        .user-info {
            display:flex; align-items:center; gap:10px; margin-left:20px;
            padding-left:20px; border-left:1px solid rgba(255,255,255,0.2);
            cursor:pointer; transition:0.3s;
        }
        .user-info:hover { opacity:0.8; }
        .user-avatar {
            width:38px; height:38px; border-radius:50%;
            background: linear-gradient(135deg,var(--primary),var(--primary-dark));
            display:flex; align-items:center; justify-content:center;
            font-weight:bold; font-size:1.1rem;
            box-shadow: 0 0 15px rgba(150,150,150,0.3);
        }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); z-index:1000;
            justify-content:center; align-items:center;
        }
        .modal.active { display:flex; }
        .modal-content {
            background: rgba(20,20,20,0.9); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border:1px solid rgba(255,255,255,0.15);
            padding:35px; border-radius:20px; width:90%; max-width:400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(150,150,150,0.1);
        }
        .modal-content h2 { margin-bottom:20px; text-align:center; letter-spacing:1px; }

        .main-content { max-width:1400px; margin:25px auto; padding:0 25px; }
        .page { display:none; }
        .page.active { display:block; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(15px); }
            to { opacity:1; transform:translateY(0); }
        }

        .glass-container {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.08);
            padding:30px; border-radius:20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            margin-bottom:25px; transition:0.3s;
        }
        .glass-container:hover {
            border-color: rgba(255,255,255,0.12);
            box-shadow: 0 12px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        h2 {
            margin-bottom:22px; text-transform:uppercase; letter-spacing:2px;
            display:flex; align-items:center; gap:10px;
            font-size:1.3rem; font-weight:700; opacity:0.95;
        }
        h3 { margin-bottom:18px; display:flex; align-items:center; gap:8px; font-weight:600; opacity:0.9; }
        .grid-2 { display:grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap:25px; }
        .form-group { margin-bottom:16px; }

        label {
            display:block; margin-bottom:6px; font-size:0.8rem;
            font-weight:600; color: rgba(255,255,255,0.8); letter-spacing:0.5px;
        }
        input, select, textarea {
            width:100%; padding:12px 16px; border-radius:12px;
            border:1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); color:#fff;
            font-size:0.9rem; transition:0.3s; outline:none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(150,150,150,0.4); background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(150,150,150,0.12), inset 0 0 12px rgba(150,150,150,0.04);
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        select { cursor:pointer; background: rgba(0,0,0,0.35); }
        select option { background:#1a1a1a; color:#fff; }
        input[readonly] { background: rgba(255,255,255,0.02); cursor:not-allowed; opacity:0.6; }

        .btn-group { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
        button {
            padding:11px 22px; border:none; border-radius:12px; cursor:pointer;
            font-weight:600; text-transform:uppercase; transition:0.3s;
            display:flex; align-items:center; gap:6px; justify-content:center;
            letter-spacing:0.6px; font-size:0.8rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .btn-primary { background: linear-gradient(135deg, rgba(130,130,130,0.8), rgba(80,80,80,0.8)); color:#fff; border:1px solid rgba(255,255,255,0.15); }
        .btn-success { background: linear-gradient(135deg, rgba(46,204,113,0.8), rgba(39,174,96,0.8)); color:#fff; border:1px solid rgba(255,255,255,0.15); }
        .btn-danger { background: linear-gradient(135deg, rgba(231,76,60,0.8), rgba(192,57,43,0.8)); color:#fff; border:1px solid rgba(255,255,255,0.15); }
        .btn-warning { background: linear-gradient(135deg, rgba(243,156,18,0.8), rgba(211,130,0,0.8)); color:#fff; border:1px solid rgba(255,255,255,0.15); }
        .btn-info { background: linear-gradient(135deg, rgba(52,152,219,0.8), rgba(41,128,185,0.8)); color:#fff; border:1px solid rgba(255,255,255,0.15); }
        .btn-outline { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.15); color:#fff; }
        button:hover { transform:translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px rgba(255,255,255,0.08); }
        button:active { transform:translateY(-1px); }

        .card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border:1px solid rgba(255,255,255,0.08);
            border-radius:14px; padding:18px; margin-bottom:12px; transition:0.3s;
        }
        .card:hover {
            background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15);
            transform:translateX(4px); box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }
        .card.editando {
            border-color: rgba(243,156,18,0.4); background: rgba(243,156,18,0.06);
            box-shadow: 0 0 25px rgba(243,156,18,0.08);
        }
        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
        .badge {
            padding:5px 10px; border-radius:16px; font-size:0.65rem;
            font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .badge-ida { background: rgba(52,152,219,0.6); color:#fff; border:1px solid rgba(52,152,219,0.4); }
        .badge-volta { background: rgba(155,89,182,0.6); color:#fff; border:1px solid rgba(155,89,182,0.4); }
        .badge-admin { background: rgba(231,76,60,0.6); color:#fff; border:1px solid rgba(231,76,60,0.4); }
        .badge-user { background: rgba(52,152,219,0.6); color:#fff; border:1px solid rgba(52,152,219,0.4); }
        .badge-status { background: rgba(241,196,15,0.6); color:#fff; border:1px solid rgba(241,196,15,0.4); animation: pulse-status 2s infinite; }
        @keyframes pulse-status {
            0%,100% { box-shadow: 0 0 8px rgba(241,196,15,0.2); }
            50% { box-shadow: 0 0 16px rgba(241,196,15,0.4); }
        }

        .rota { display:flex; align-items:center; gap:12px; margin:8px 0; font-size:1rem; }
        .info-text { font-size:0.8rem; opacity:0.7; margin-top:8px; }
        .auto-badge {
            background: rgba(46,204,113,0.15); border:1px solid rgba(46,204,113,0.3);
            padding:3px 8px; border-radius:12px; font-size:0.6rem; font-weight:700;
            display:inline-flex; align-items:center; gap:4px; letter-spacing:0.5px;
        }
        .linked-badge {
            background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            padding:5px 10px; border-radius:8px; font-size:0.75rem; margin-top:6px; display:inline-block;
        }
        .edit-input { background: rgba(0,0,0,0.45) !important; border-color: rgba(243,156,18,0.4) !important; }

        .table-container { overflow-x:auto; }
        table {
            width:100%; border-collapse:collapse; margin-top:15px;
            background: rgba(255,255,255,0.02); border-radius:12px; overflow:hidden;
        }
        th, td { padding:12px 15px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.04); font-weight:700; text-transform:uppercase; font-size:0.7rem; letter-spacing:0.8px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .toast {
            position:fixed; top:15px; right:15px; padding:14px 24px; border-radius:12px;
            animation: slideIn 0.3s, slideOut 0.3s 2.2s forwards; z-index:1000;
            font-weight:600; color:#fff; backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); font-size:0.85rem;
        }
        .toast-success { background: rgba(46,204,113,0.75); border:1px solid rgba(46,204,113,0.4); }
        .toast-error { background: rgba(231,76,60,0.75); border:1px solid rgba(231,76,60,0.4); }
        .toast-info { background: rgba(52,152,219,0.75); border:1px solid rgba(52,152,219,0.4); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes slideOut { from { transform:translateX(0); opacity:1; } to { transform:translateX(100%); opacity:0; } }

        .mensagem-erro { color:#ff6b6b; font-size:0.75rem; margin-top:4px; display:none; }
        .mensagem-erro.visivel { display:block; }

        .modal-trocar-motorista { max-width:450px; }
        .modal-trocar-senha { max-width:450px; }
        .motorista-option {
            display:flex; align-items:center; gap:12px; padding:14px; margin-bottom:8px;
            background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06);
            border-radius:12px; cursor:pointer; transition:0.3s;
        }
        .motorista-option:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
        .motorista-option.selecionado { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.4); box-shadow: 0 0 15px rgba(46,204,113,0.08); }

        .icone-onibus { display:inline-block; font-size:1.4rem; animation: onibus-move 2s ease-in-out infinite; }
        @keyframes onibus-move { 0%,100% { transform:translateX(0); } 50% { transform:translateX(4px); } }

        @media (max-width:768px) {
            .grid-2 { grid-template-columns:1fr; }
            .nav { flex-wrap:wrap; height:auto; padding:12px 0; }
            .menu { overflow-x:auto; width:100%; margin-top:8px; padding-bottom:4px; }
            .user-info { margin-top:8px; padding-left:0; border-left:none; width:100%; justify-content:flex-end; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="bg-particles" id="particles"></div>
    <div class="ns-watermark">VIANORTESUL</div>

    <div id="modalLogin" class="modal active">

    <div id="modalTrocarMotorista" class="modal">

    <header class="header">
        <nav class="nav">

                <button class="menu-btn active" onclick="mudarPagina('viagens')"><span class="icone-onibus">🚌</span> Viagens</button>

        <div id="page-veiculos" class="page"><div class="glass-container" id="veiculosContainer"></div></div>
        <div id="page-motoristas" class="page"><div class="glass-container" id="motoristasContainer"></div></div>
        <div id="page-admins" class="page"><div class="glass-container" id="adminsContainer"></div></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"></script>
    <script>
        // ==================== CONFIGURAÇÃO DO FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDYNltGhYmZ_5v0iL6amxmhySltQ1bNAsA",
            authDomain: "controledeviagem-6f29d.firebaseapp.com",
            projectId: "controledeviagem-6f29d",
            storageBucket: "controledeviagem-6f29d.firebasestorage.app",
            messagingSenderId: "630942841173",
            appId: "1:630942841173:web:7b7fb728104bb1a96e57dc"
        };

        // Inicializa o Firebase
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log('✅ Firebase conectado com sucesso!');
        } catch (error) {
            console.error('❌ Erro ao conectar com Firebase:', error);
        }

        // ==================== VARIÁVEIS GLOBAIS ====================
        const DB_KEY = 'ns_db_v9';
        let DB = { viagensIda:[], viagensVolta:[], veiculos:[], motoristas:[], administradores:[], usuarioLogado:null };
        let viagemEditando = { tipo:null, id:null };
        let trocaMotorista = { tipo:null, id:null, motoristaSelecionado:null };

        // ==================== FUNÇÕES DO BANCO DE DADOS ====================
        async function carregarDB() {
            try {
                // Tenta carregar do Firebase primeiro
                if (db) {
                    const doc = await db.collection('dados').doc('principal').get();
                    if (doc.exists) {
                        const dados = doc.data();
                        DB.viagensIda = dados.viagensIda || [];
                        DB.viagensVolta = dados.viagensVolta || [];
                        DB.veiculos = dados.veiculos || [];
                        DB.motoristas = dados.motoristas || [];
                        DB.administradores = dados.administradores || [];
                        console.log('✅ Dados carregados do Firebase');
                    }
                }
                
                // Carrega usuário logado do localStorage
                const usuarioSalvo = localStorage.getItem('ns_usuario_logado');
                DB.usuarioLogado = usuarioSalvo ? JSON.parse(usuarioSalvo) : null;
                
            } catch(e) {
                console.error('Erro ao carregar do Firebase, usando localStorage:', e);
                // Fallback para localStorage
                try {
                    const d = localStorage.getItem(DB_KEY);
                    if (d) {
                        const p = JSON.parse(d);
                        DB.viagensIda = p.viagensIda || [];
                        DB.viagensVolta = p.viagensVolta || [];
                        DB.veiculos = p.veiculos || [];
                        DB.motoristas = p.motoristas || [];
                        DB.administradores = p.administradores || [];
                        DB.usuarioLogado = p.usuarioLogado || null;
                    }
                } catch(e2) {
                    console.error('Erro total:', e2);
                }
            }
        }

        async function salvarDB() {
            try {
                // Salva no localStorage como backup
                localStorage.setItem(DB_KEY, JSON.stringify({
                    viagensIda: DB.viagensIda,
                    viagensVolta: DB.viagensVolta,
                    veiculos: DB.veiculos,
                    motoristas: DB.motoristas,
                    administradores: DB.administradores,
                    usuarioLogado: DB.usuarioLogado
                }));

                // Salva no Firebase
                if (db) {
                    await db.collection('dados').doc('principal').set({
                        viagensIda: DB.viagensIda,
                        viagensVolta: DB.viagensVolta,
                        veiculos: DB.veiculos,
                        motoristas: DB.motoristas,
                        administradores: DB.administradores,
                        atualizadoEm: new Date().toISOString()
                    });
                    console.log('✅ Dados salvos no Firebase');
                }
            } catch(e) {
                console.error('Erro ao salvar:', e);
                showToast('Erro ao salvar!', 'error');
            }
        }

                    { id:2, nome:'Usuário Padrão', usuario:'user', telefone:'(11) 88888-8888', senha:'user123', nivel:'user' }
                ];

        // ==================== FUNÇÕES DE AUTENTICAÇÃO ====================
        async function fazerLogin() {
            const u = document.getElementById('loginUsuario').value.trim();
            const s = document.getElementById('loginSenha').value.trim();
            const e = document.getElementById('erroLogin');
            e.classList.remove('visivel'); e.textContent='';
            if (!u || !s) { e.textContent='Preencha todos os campos!'; e.classList.add('visivel'); return; }
            
            await carregarDB();
            initUsers();
            
            const user = DB.administradores.find(a => a.usuario===u && a.senha===s);
            if (user) {
                DB.usuarioLogado = { id:user.id, nome:user.nome, usuario:user.usuario, nivel:user.nivel, telefone:user.telefone };
                localStorage.setItem('ns_usuario_logado', JSON.stringify(DB.usuarioLogado));
                document.getElementById('modalLogin').classList.remove('active');
                document.getElementById('loginUsuario').value=''; document.getElementById('loginSenha').value='';
                atualizarUI(); showToast(`Bem-vindo, ${user.nome}! ✅`); mudarPagina('viagens');
            } else {
                e.textContent = DB.administradores.some(a => a.usuario===u) ? 'Senha incorreta!' : 'Usuário não encontrado!';
                e.classList.add('visivel');
            }
        }

        function fazerLogout() {
            if (confirm('Sair do sistema?')) {
                DB.usuarioLogado=null;
                localStorage.removeItem('ns_usuario_logado');
                salvarDB();
                document.getElementById('modalLogin').classList.add('active');
                document.getElementById('loginUsuario').value=''; document.getElementById('loginSenha').value='';
                atualizarUI(); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                document.getElementById('page-viagens').classList.add('active'); showToast('Logout! 👋');
            }
        }

        function mostrarModalLogin() {
            if (DB.usuarioLogado) { if (confirm('Fazer logout?')) fazerLogout(); }
            else { document.getElementById('modalLogin').classList.add('active'); document.getElementById('loginUsuario').value=''; document.getElementById('loginSenha').value=''; document.getElementById('erroLogin').classList.remove('visivel'); }
        }

        function atualizarUI() {
            const av=document.getElementById('userAvatar'), nm=document.getElementById('userName'), nv=document.getElementById('userNivel');
            const ae=document.querySelectorAll('.admin-only');
            if (DB.usuarioLogado) {
                av.textContent=DB.usuarioLogado.nome.charAt(0).toUpperCase(); nm.textContent=DB.usuarioLogado.nome;
                nv.textContent=DB.usuarioLogado.nivel==='admin'?'Administrador':'Usuário';
                ae.forEach(el=>el.style.display=DB.usuarioLogado.nivel==='admin'?'':'none');
            } else {
                av.textContent='?'; nm.textContent='Não logado'; nv.textContent='';
                ae.forEach(el=>el.style.display='none');
                const li=document.getElementById('listaViagensIda'), lv=document.getElementById('listaViagensVolta');
                if(li) li.innerHTML='<p style="text-align:center;opacity:0.5;">Faça login</p>';
                if(lv) lv.innerHTML='<p style="text-align:center;opacity:0.5;">Faça login</p>';
            }

        function verificarPermissao() { if(!DB.usuarioLogado){document.getElementById('modalLogin').classList.add('active');return false;} return true; }
        function verificarPermissaoAdmin() { if(!verificarPermissao())return false; if(DB.usuarioLogado.nivel!=='admin'){showToast('Acesso restrito!','error');mudarPagina('viagens');return false;} return true; }

        function mudarPagina(pagina) {
            if (!DB.usuarioLogado && pagina!=='viagens') { document.getElementById('modalLogin').classList.add('active'); return; }
            if (pagina==='viagens' && !DB.usuarioLogado) { document.getElementById('modalLogin').classList.add('active'); return; }
            if (!verificarPermissao()) return;
            const pa=['cadastro','veiculos','motoristas','admins'];
            if (pa.includes(pagina) && !verificarPermissaoAdmin()) return;
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            const pe=document.getElementById(`page-${pagina}`); if(pe) pe.classList.add('active');
            document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b=>{
                const t=b.textContent.toLowerCase();
                if(t.includes('viagens')&&pagina==='viagens')b.classList.add('active');
                if(t.includes('nova')&&pagina==='cadastro')b.classList.add('active');
                if(t.includes('veículos')&&pagina==='veiculos')b.classList.add('active');
                if(t.includes('motoristas')&&pagina==='motoristas')b.classList.add('active');
                if(t.includes('admins')&&pagina==='admins')b.classList.add('active');
            });
            if(pagina==='viagens') atualizarListas();
            if(pagina==='cadastro') carregarCadastro();
            if(pagina==='veiculos') carregarVeiculos();
            if(pagina==='motoristas') carregarMotoristas();
            if(pagina==='admins') carregarAdmins();
        }

        function abrirModalTrocarSenha() {
            const select = document.getElementById('trocaSenhaUsuario');
            select.innerHTML = DB.administradores.map(a => `<option value="${a.id}">${a.nome} (${a.usuario})</option>`).join('');
            document.getElementById('novaSenha').value = '';
            document.getElementById('confirmarNovaSenha').value = '';
            document.querySelectorAll('#modalTrocarSenha .mensagem-erro').forEach(e => e.classList.remove('visivel'));
            document.getElementById('modalTrocarSenha').classList.add('active');
        }

        function confirmarTrocaSenha() {
            const id = parseInt(document.getElementById('trocaSenhaUsuario').value);
            const ns = document.getElementById('novaSenha').value;
            const cs = document.getElementById('confirmarNovaSenha').value;
            document.querySelectorAll('#modalTrocarSenha .mensagem-erro').forEach(e => e.classList.remove('visivel'));
            let er = false;
            if (ns.length < 6) {
                document.getElementById('erroNovaSenha').textContent = 'Mínimo 6 caracteres!';
                document.getElementById('erroNovaSenha').classList.add('visivel'); er = true;
            }
            if (ns !== cs) {
                document.getElementById('erroConfirmarNovaSenha').textContent = 'Senhas não coincidem!';
                document.getElementById('erroConfirmarNovaSenha').classList.add('visivel'); er = true;
            }
            if (er) return;
            const user = DB.administradores.find(a => a.id === id);
            if (user) {
                user.senha = ns;
                salvarDB();
                document.getElementById('modalTrocarSenha').classList.remove('active');
                showToast('Senha alterada com sucesso! ✅');
                if (DB.usuarioLogado && DB.usuarioLogado.id === id) {
                    showToast('Sua senha foi alterada! Faça login novamente.', 'info');
                    fazerLogout();
                }
            }
        }

            document.getElementById('modalTrocarSenha').classList.remove('active');

            const m=DB.motoristas.find(x=>x.id===trocaMotorista.motoristaSelecionado);

            const v=trocaMotorista.tipo==='ida'?DB.viagensIda.find(x=>x.id===trocaMotorista.id):DB.viagensVolta.find(x=>x.id===trocaMotorista.id);

            v.motorista=m.nome; v.motoristaId=m.id;

        function cadastrarViagem() {
            const o=document.getElementById('idaOrigem').value.trim(), d=document.getElementById('idaDestino').value.trim();
            if(!o||!d){showToast('Preencha Origem e Destino!','error');return;}
            const mIda=document.getElementById('idaMotorista').value, ms=DB.motoristas.find(m=>m.nome===mIda);
            const mVola=document.getElementById('voltaMotorista').value, msV=DB.motoristas.find(m=>m.nome===mVola);
            const vi={
                id:Date.now(), tipo:'ida', origem:o, destino:d,
                data:document.getElementById('idaData').value||new Date().toISOString(),
                veiculo:document.getElementById('idaVeiculo').value||'Não definido',
                motorista:mIda||'Não definido', motoristaId:ms?ms.id:null,
                observacoes:document.getElementById('idaObs').value.trim(),
                status:'Iniciando viagem', dataCadastro:new Date().toLocaleString('pt-BR'),
                criadoPor:DB.usuarioLogado?DB.usuarioLogado.nome:'Sistema'
            };
            const vv={
                id:Date.now()+1, tipo:'volta', origem:d, destino:o,
                data:document.getElementById('voltaData').value||new Date().toISOString(),
                veiculo:document.getElementById('voltaVeiculo').value||vi.veiculo,
                motorista:mVola||vi.motorista, motoristaId:msV?msV.id:vi.motoristaId,
                observacoes:document.getElementById('voltaObs').value.trim(),
                viagemIdaVinculada:vi.id, status:'Iniciando viagem',
                dataCadastro:new Date().toLocaleString('pt-BR'),
                criadoPor:DB.usuarioLogado?DB.usuarioLogado.nome:'Sistema'
            };
            DB.viagensIda.unshift(vi); DB.viagensVolta.unshift(vv); salvarDB(); carregarCadastro(); showToast('Viagem salva! ✅');
        }

        function cancelarEdicao(){viagemEditando={tipo:null,id:null};atualizarListas();}

        function salvarEdicao(tipo,id){
            const v=tipo==='ida'?DB.viagensIda.find(x=>x.id===id):DB.viagensVolta.find(x=>x.id===id);
            if(!v){showToast('Viagem não encontrada!','error');return;}
            const o=document.getElementById(`edit-origem-${id}`)?.value;
            const d=document.getElementById(`edit-destino-${id}`)?.value;
            const dt=document.getElementById(`edit-data-${id}`)?.value;
            const ve=document.getElementById(`edit-veiculo-${id}`)?.value;
            const mo=document.getElementById(`edit-motorista-${id}`)?.value;
            const ob=document.getElementById(`edit-obs-${id}`)?.value;
            if(o)v.origem=o; if(d)v.destino=d; if(dt)v.data=dt; if(ve)v.veiculo=ve;
            if(mo){v.motorista=mo; const mm=DB.motoristas.find(m=>m.nome===mo); v.motoristaId=mm?mm.id:null;}
            if(ob!==undefined)v.observacoes=ob;
            if(tipo==='ida'&&o&&d){const vv=DB.viagensVolta.find(x=>x.viagemIdaVinculada===id); if(vv){vv.origem=d;vv.destino=o;}}
            salvarDB(); cancelarEdicao(); showToast('Viagem atualizada! ✅');
        }

        function excluirViagemIda(id){
            if(confirm('Excluir ida? A volta vinculada também será excluída.')){
                DB.viagensIda=DB.viagensIda.filter(v=>v.id!==id);
                DB.viagensVolta=DB.viagensVolta.filter(v=>v.viagemIdaVinculada!==id);
                salvarDB(); atualizarListas(); showToast('Excluída! 🗑️');
            }
        }

        function excluirViagemVolta(id){
            if(confirm('Excluir volta?')){
                DB.viagensVolta=DB.viagensVolta.filter(v=>v.id!==id);
                salvarDB(); atualizarListas(); showToast('Excluída! 🗑️');
            }
        }

        // ==================== VEÍCULOS ====================
        function carregarVeiculos(){
            const c=document.getElementById('veiculosContainer'); if(!c)return;
            c.innerHTML=`
                <h2>🚗 Veículos</h2>
                <div class="grid-2">
                    <div>
                        <h3>Cadastrar</h3>
                        <div class="form-group"><label>🚙 Modelo</label><input type="text" id="veiculoModelo" placeholder="Ex: Toyota Corolla"></div>
                        <div class="form-group"><label>🔢 Placa</label><input type="text" id="veiculoPlaca" placeholder="ABC-1234" style="text-transform:uppercase;"></div>
                        <div class="form-group"><label>📅 Ano</label><input type="number" id="veiculoAno" placeholder="2024" min="2000" max="2030"></div>
                        <div class="btn-group"><button class="btn-primary" onclick="cadastrarVeiculo()">💾 Salvar</button><button class="btn-outline" onclick="carregarVeiculos()">🗑️ Limpar</button></div>
                    </div>
                    <div><h3>Lista</h3><div class="table-container"><table><thead><tr><th>Modelo</th><th>Placa</th><th>Ano</th><th></th></tr></thead><tbody id="corpoTabelaVeiculos"></tbody></table></div></div>
                </div>`; attTabelaVeiculos();
        }

        function cadastrarVeiculo(){
            const m=document.getElementById('veiculoModelo').value.trim(), p=document.getElementById('veiculoPlaca').value.trim().toUpperCase();
            const a=document.getElementById('veiculoAno').value;
            if(!m||!p){showToast('Preencha Modelo e Placa!','error');return;}
            DB.veiculos.push({id:Date.now(),modelo:m,placa:p,ano:a}); salvarDB(); carregarVeiculos(); showToast('Veículo salvo! 🚗');
        }

        function attTabelaVeiculos(){
            const t=document.getElementById('corpoTabelaVeiculos'); if(!t)return;
            if(!DB.veiculos.length){t.innerHTML='<tr><td colspan="4" style="text-align:center;opacity:0.5;">Nenhum veículo</td></tr>';return;}
            t.innerHTML=DB.veiculos.map(v=>`<tr><td>${v.modelo}</td><td>${v.placa}</td><td>${v.ano||'-'}</td><td><button class="btn-danger" style="padding:4px 8px;font-size:0.7rem;" onclick="excluirVeiculo(${v.id})">🗑️</button></td></tr>`).join('');
        }

        function excluirVeiculo(id){if(confirm('Excluir?')){DB.veiculos=DB.veiculos.filter(v=>v.id!==id);salvarDB();carregarVeiculos();showToast('Excluído! 🗑️');}}

        // ==================== MOTORISTAS ====================
        function carregarMotoristas(){
            const c=document.getElementById('motoristasContainer'); if(!c)return;
            c.innerHTML=`
                <h2>👤 Motoristas</h2>
                <div class="grid-2">
                    <div>
                        <h3>Cadastrar</h3>
                        <div class="form-group"><label>👤 Nome Completo</label><input type="text" id="motoristaNome" placeholder="Nome do motorista"></div>
                        <div class="form-group"><label>📱 Telefone</label><input type="tel" id="motoristaTelefone" placeholder="(00) 00000-0000"></div>
                        <div class="form-group"><label>🚗 CNH</label><input type="text" id="motoristaCNH" placeholder="Número da CNH"></div>
                        <div class="btn-group"><button class="btn-primary" onclick="cadastrarMotorista()">💾 Salvar</button><button class="btn-outline" onclick="carregarMotoristas()">🗑️ Limpar</button></div>
                    </div>
                    <div><h3>Lista</h3><div class="table-container"><table><thead><tr><th>Nome</th><th>Telefone</th><th>CNH</th><th></th></tr></thead><tbody id="corpoTabelaMotoristas"></tbody></table></div></div>
                </div>`; attTabelaMotoristas();
        }

        function cadastrarMotorista(){
            const n=document.getElementById('motoristaNome').value.trim();
            if(!n){showToast('Preencha o nome!','error');return;}
            DB.motoristas.push({
                id:Date.now(), nome:n,
                telefone:document.getElementById('motoristaTelefone').value.trim(),
                cnh:document.getElementById('motoristaCNH').value.trim()
            });
            salvarDB(); carregarMotoristas(); showToast('Motorista salvo! 👤');
        }

        function attTabelaMotoristas(){
            const t=document.getElementById('corpoTabelaMotoristas'); if(!t)return;
            if(!DB.motoristas.length){t.innerHTML='<tr><td colspan="4" style="text-align:center;opacity:0.5;">Nenhum motorista</td></tr>';return;}
            t.innerHTML=DB.motoristas.map(m=>`<tr><td>${m.nome}</td><td>${m.telefone||'-'}</td><td>${m.cnh||'-'}</td><td><button class="btn-danger" style="padding:4px 8px;font-size:0.7rem;" onclick="excluirMotorista(${m.id})">🗑️</button></td></tr>`).join('');
        }

        function excluirMotorista(id){if(confirm('Excluir?')){DB.motoristas=DB.motoristas.filter(m=>m.id!==id);salvarDB();carregarMotoristas();showToast('Excluído! 🗑️');}}

        // ==================== ADMINISTRADORES ====================
        function carregarAdmins(){
            const c=document.getElementById('adminsContainer'); if(!c)return;
            c.innerHTML=`
                <h2>👥 Usuários</h2>
                <div class="grid-2">
                    <div>
                        <h3>Cadastrar</h3>
                        <div class="form-group"><label>👤 Nome</label><input type="text" id="adminNome" placeholder="Nome completo"></div>
                        <div class="form-group"><label>👤 Usuário (Login)</label><input type="text" id="adminUsuario" placeholder="Nome para login"><div class="mensagem-erro" id="erroCadastroUsuario"></div></div>
                        <div class="form-group"><label>📱 Telefone</label><input type="tel" id="adminTelefone" placeholder="(00) 00000-0000"></div>
                        <div class="form-group"><label>🔑 Senha</label><input type="password" id="adminSenha" placeholder="Mínimo 6 caracteres"><div class="mensagem-erro" id="erroCadastroSenha"></div></div>
                        <div class="form-group"><label>🔑 Confirmar Senha</label><input type="password" id="adminConfirmarSenha" placeholder="Repita a senha"><div class="mensagem-erro" id="erroConfirmarSenha"></div></div>
                        <div class="form-group"><label>🎫 Nível</label><select id="adminNivel"><option value="user">Usuário</option><option value="admin">Administrador</option></select></div>
                        <div class="btn-group"><button class="btn-primary" onclick="cadastrarAdmin()">💾 Salvar</button><button class="btn-outline" onclick="carregarAdmins()">🗑️ Limpar</button></div>
                    </div>
                    <div><h3>Lista</h3><div class="table-container"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Nível</th><th></th></tr></thead><tbody id="corpoTabelaAdmins"></tbody></table></div></div>
                </div>`; attTabelaAdmins();
        }

        function cadastrarAdmin(){
            const n=document.getElementById('adminNome').value.trim(), u=document.getElementById('adminUsuario').value.trim();
            const t=document.getElementById('adminTelefone').value.trim(), s=document.getElementById('adminSenha').value;
            const cs=document.getElementById('adminConfirmarSenha').value, nv=document.getElementById('adminNivel').value;
            document.querySelectorAll('.mensagem-erro').forEach(e=>e.classList.remove('visivel'));
            let er=false;
            if(!n||!u||!s){showToast('Preencha nome, usuário e senha!','error');return;}
            if(DB.administradores.some(a=>a.usuario===u)){document.getElementById('erroCadastroUsuario').textContent='Usuário já existe!';document.getElementById('erroCadastroUsuario').classList.add('visivel');er=true;}
            if(s.length<6){document.getElementById('erroCadastroSenha').textContent='Mínimo 6 caracteres!';document.getElementById('erroCadastroSenha').classList.add('visivel');er=true;}
            if(s!==cs){document.getElementById('erroConfirmarSenha').textContent='Senhas não coincidem!';document.getElementById('erroConfirmarSenha').classList.add('visivel');er=true;}
            if(er)return;
            DB.administradores.push({id:Date.now(),nome:n,usuario:u,telefone:t,senha:s,nivel:nv});
            salvarDB(); carregarAdmins(); showToast('Usuário salvo! ✅');
        }

        function attTabelaAdmins(){
            const t=document.getElementById('corpoTabelaAdmins'); if(!t)return;
            if(!DB.administradores.length){t.innerHTML='<tr><td colspan="4" style="text-align:center;opacity:0.5;">Nenhum usuário</td></tr>';return;}
            t.innerHTML=DB.administradores.map(a=>`<tr><td>${a.nome}</td><td>${a.usuario}</td><td><span class="badge ${a.nivel==='admin'?'badge-admin':'badge-user'}">${a.nivel}</span></td><td>${DB.usuarioLogado&&DB.usuarioLogado.id!==a.id?`<button class="btn-danger" style="padding:4px 8px;font-size:0.7rem;" onclick="excluirAdmin(${a.id})">🗑️</button>`:'<span style="opacity:0.4;font-size:0.7rem;">Você</span>'}</td></tr>`).join('');
        }

        function excluirAdmin(id){
            if(DB.administradores.length<=1){showToast('Não é possível excluir o último!','error');return;}
            if(DB.usuarioLogado&&id===DB.usuarioLogado.id){showToast('Não pode se excluir!','error');return;}
            if(confirm('Excluir?')){DB.administradores=DB.administradores.filter(a=>a.id!==id);salvarDB();carregarAdmins();showToast('Excluído! 🗑️');}
        }

        // ==================== WHATSAPP E TOAST ====================
        function enviarWhatsApp(id,tipo){
            const v=tipo==='ida'?DB.viagensIda.find(x=>x.id===id):DB.viagensVolta.find(x=>x.id===id);
            if(!v){showToast('Não encontrada!','error');return;}
            const msg=`*Relatório NS VIANORTESUL*%0A%0A🔹 ${tipo.toUpperCase()}%0A📍 ${v.origem} ➔ ${v.destino}%0A📅 ${new Date(v.data).toLocaleString('pt-BR')}%0A🚗 ${v.veiculo}%0A👤 ${v.motorista||'N/A'}%0A🚀 ${v.status||'Iniciando viagem'}%0A${v.observacoes?`📝 ${v.observacoes}%0A`:''}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function showToast(msg,tipo='success'){
            const t=document.createElement('div'); t.className=`toast toast-${tipo}`; t.textContent=msg;
            document.body.appendChild(t); setTimeout(()=>t.remove(), 2500);
        }

        // ==================== INICIALIZAÇÃO ====================
        function criarParticulas() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `width:${Math.random()*5+2}px;height:${p.style.width};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*20}s;animation-duration:${Math.random()*20+10}s;`;
                c.appendChild(p);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            criarParticulas();
            await carregarDB();
            initUsers();
            atualizarUI();
            if (DB.usuarioLogado) {
                document.getElementById('modalLogin').classList.remove('active');
                mudarPagina('viagens');
            } else {
                document.getElementById('modalLogin').classList.add('active');
            }
        });

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter' && document.getElementById('modalLogin').classList.contains('active')) {
                fazerLogin();
            }
        });
    </script>
</body>
</html>

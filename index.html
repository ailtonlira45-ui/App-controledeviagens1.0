<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS - Sistema de Controle de Viagens</title>
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-dark: #8b0000;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        body {
            min-height: 100vh;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #8b0000, #ff0000);
            z-index: -1;
            animation: pulse 6s infinite alternate;
        }

        .ns-watermark {
            position: fixed;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            letter-spacing: 20px;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0% { background-color: #8b0000; opacity: 0.85; }
            100% { background-color: #ff4d4d; opacity: 0.95; }
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            height: 70px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(45deg, #fff, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .menu {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .menu-btn:hover, .menu-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            margin-bottom: 25px;
            text-align: center;
        }

        .main-content {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
        }

        h2 { 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            color: rgba(255, 255, 255, 0.9);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.2);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        select {
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
        }

        select option { background: #333; color: white; }

        input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }

        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 25px; 
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-outline { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; 
        }

        button:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .card.editando {
            border-color: var(--warning);
            background: rgba(243, 156, 18, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-ida { background: #3498db; color: white; }
        .badge-volta { background: #9b59b6; color: white; }
        .badge-admin { background: #e74c3c; color: white; }
        .badge-user { background: #3498db; color: white; }

        .rota {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .info-text {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .auto-badge {
            background: rgba(46, 204, 113, 0.3);
            border: 1px solid var(--success);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .linked-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 8px;
            display: inline-block;
        }

        .edit-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: var(--warning) !important;
            margin-top: 5px;
        }

        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:hover { background: rgba(255, 255, 255, 0.05); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            animation: slideIn 0.3s, slideOut 0.3s 2.5s forwards;
            z-index: 1000;
            font-weight: bold;
            color: white;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--info); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .mensagem-erro {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .mensagem-erro.visivel {
            display: block;
        }

        .info-login {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0.7;
            cursor: pointer;
            transition: 0.3s;
        }

        .info-login:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
        }

        .info-detalhes {
            display: none;
            margin-top: 10px;
            text-align: left;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .info-detalhes.visivel {
            display: block;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            
            .nav {
                flex-wrap: wrap;
                height: auto;
                padding: 15px 0;
            }
            
            .menu {
                overflow-x: auto;
                width: 100%;
                margin-top: 10px;
                padding-bottom: 5px;
            }
            
            .user-info {
                margin-top: 10px;
                padding-left: 0;
                border-left: none;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="ns-watermark">NS</div>

    <!-- Modal de Login -->
    <div id="modalLogin" class="modal active">
        <div class="modal-content">
            <h2>🔐 Login NS</h2>
            <div class="form-group">
                <label>👤 Nome de Usuário</label>
                <input type="text" id="loginUsuario" placeholder="Seu nome de usuário" autocomplete="off">
                <div class="mensagem-erro" id="erroLogin"></div>
            </div>
            <div class="form-group">
                <label>🔑 Senha</label>
                <input type="password" id="loginSenha" placeholder="Sua senha" autocomplete="off">
            </div>
            <button class="btn-primary" onclick="fazerLogin()" style="width: 100%;">Entrar</button>
            <div class="info-login" onclick="toggleInfoLogin()">
                📝 Clique aqui para ver usuários de teste
                <div class="info-detalhes" id="infoLoginDetalhes">
                    <p>👑 <strong>Admin:</strong> admin / admin123</p>
                    <p>👤 <strong>Usuário:</strong> user / user123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Header com Menu -->
    <header class="header">
        <nav class="nav">
            <div class="logo" onclick="mudarPagina('viagens')">NS</div>
            
            <div class="menu" id="menuPrincipal">
                <button class="menu-btn active" onclick="mudarPagina('viagens')">✈️ Viagens</button>
                <button class="menu-btn admin-only" onclick="mudarPagina('cadastro')">➕ Nova Viagem</button>
                <button class="menu-btn admin-only" onclick="mudarPagina('veiculos')">🚗 Veículos</button>
                <button class="menu-btn admin-only" onclick="mudarPagina('motoristas')">👤 Motoristas</button>
                <button class="menu-btn admin-only" onclick="mudarPagina('admins')">👥 Admins</button>
            </div>

            <div class="user-info" id="userInfo" onclick="mostrarModalLogin()">
                <div class="user-avatar" id="userAvatar">?</div>
                <div>
                    <div style="font-weight: bold; font-size: 0.9rem;" id="userName">Não logado</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;" id="userNivel"></div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <div class="main-content">
        
        <!-- Página de Viagens -->
        <div id="page-viagens" class="page active">
            <div class="glass-container">
                <h2>📋 Histórico de Viagens</h2>
                
                <div class="grid-2">
                    <div>
                        <h3>🔵 Viagens de IDA</h3>
                        <div id="listaViagensIda">
                            <p style="text-align: center; opacity: 0.5;">Nenhuma viagem de ida</p>
                        </div>
                    </div>
                    
                    <div>
                        <h3>🟣 Viagens de VOLTA</h3>
                        <div id="listaViagensVolta">
                            <p style="text-align: center; opacity: 0.5;">Nenhuma viagem de volta</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Página de Cadastro -->
        <div id="page-cadastro" class="page">
            <div class="glass-container" id="cadastroContainer"></div>
        </div>

        <!-- Página de Veículos -->
        <div id="page-veiculos" class="page">
            <div class="glass-container" id="veiculosContainer"></div>
        </div>

        <!-- Página de Motoristas -->
        <div id="page-motoristas" class="page">
            <div class="glass-container" id="motoristasContainer"></div>
        </div>

        <!-- Página de Administradores -->
        <div id="page-admins" class="page">
            <div class="glass-container" id="adminsContainer"></div>
        </div>
    </div>

    <script>
        // ==================== BANCO DE DADOS CENTRAL ====================
        // Este objeto contém TODOS os dados do sistema
        // Cada instância do site tem seu próprio banco (não compartilha com outros)
        const DB_KEY = 'ns_sistema_viagens_db_v2';
        
        let DB = {
            viagensIda: [],
            viagensVolta: [],
            veiculos: [],
            motoristas: [],
            administradores: [],
            usuarioLogado: null
        };
        
        let viagemEditando = { tipo: null, id: null };

        // ==================== FUNÇÕES DE PERSISTÊNCIA ====================
        function carregarBancoDados() {
            try {
                const dadosSalvos = localStorage.getItem(DB_KEY);
                if (dadosSalvos) {
                    const dados = JSON.parse(dadosSalvos);
                    DB.viagensIda = dados.viagensIda || [];
                    DB.viagensVolta = dados.viagensVolta || [];
                    DB.veiculos = dados.veiculos || [];
                    DB.motoristas = dados.motoristas || [];
                    DB.administradores = dados.administradores || [];
                    DB.usuarioLogado = dados.usuarioLogado || null;
                }
            } catch (e) {
                console.error('Erro ao carregar banco de dados:', e);
                resetarBancoDados();
            }
        }

        function salvarBancoDados() {
            try {
                const dadosParaSalvar = {
                    viagensIda: DB.viagensIda,
                    viagensVolta: DB.viagensVolta,
                    veiculos: DB.veiculos,
                    motoristas: DB.motoristas,
                    administradores: DB.administradores,
                    usuarioLogado: DB.usuarioLogado
                };
                localStorage.setItem(DB_KEY, JSON.stringify(dadosParaSalvar));
            } catch (e) {
                console.error('Erro ao salvar banco de dados:', e);
                showToast('Erro ao salvar dados! Verifique o espaço disponível.', 'error');
            }
        }

        function resetarBancoDados() {
            DB.viagensIda = [];
            DB.viagensVolta = [];
            DB.veiculos = [];
            DB.motoristas = [];
            DB.administradores = [];
            DB.usuarioLogado = null;
        }

        function inicializarUsuariosPadrao() {
            carregarBancoDados();
            
            if (DB.administradores.length === 0) {
                DB.administradores = [
                    { 
                        id: 1, 
                        nome: 'Administrador', 
                        usuario: 'admin', 
                        telefone: '(11) 99999-9999', 
                        senha: 'admin123', 
                        nivel: 'admin' 
                    },
                    { 
                        id: 2, 
                        nome: 'Usuário Padrão', 
                        usuario: 'user', 
                        telefone: '(11) 88888-8888', 
                        senha: 'user123', 
                        nivel: 'user' 
                    }
                ];
                salvarBancoDados();
            }
        }

        // ==================== FUNÇÕES DE LOGIN CORRIGIDAS ====================
        function toggleInfoLogin() {
            const detalhes = document.getElementById('infoLoginDetalhes');
            detalhes.classList.toggle('visivel');
        }

        function fazerLogin() {
            const usuarioInput = document.getElementById('loginUsuario').value.trim();
            const senhaInput = document.getElementById('loginSenha').value.trim();
            const erroDiv = document.getElementById('erroLogin');
            
            // Limpar mensagem de erro
            erroDiv.classList.remove('visivel');
            erroDiv.textContent = '';
            
            if (!usuarioInput || !senhaInput) {
                erroDiv.textContent = 'Preencha usuário e senha!';
                erroDiv.classList.add('visivel');
                return;
            }
            
            // Recarregar banco de dados para garantir dados atualizados
            carregarBancoDados();
            inicializarUsuariosPadrao();
            
            // Buscar usuário - comparação exata (case-sensitive para segurança)
            const usuarioEncontrado = DB.administradores.find(a => 
                a.usuario === usuarioInput && a.senha === senhaInput
            );
            
            if (usuarioEncontrado) {
                // Login bem-sucedido - salvar dados do usuário logado (sem a senha)
                DB.usuarioLogado = {
                    id: usuarioEncontrado.id,
                    nome: usuarioEncontrado.nome,
                    usuario: usuarioEncontrado.usuario,
                    nivel: usuarioEncontrado.nivel,
                    telefone: usuarioEncontrado.telefone
                };
                
                salvarBancoDados();
                
                // Fechar modal e limpar campos
                document.getElementById('modalLogin').classList.remove('active');
                document.getElementById('loginUsuario').value = '';
                document.getElementById('loginSenha').value = '';
                document.getElementById('erroLogin').classList.remove('visivel');
                
                // Atualizar interface
                atualizarInterfaceUsuario();
                
                // Mostrar mensagem de boas-vindas
                showToast(`Bem-vindo, ${usuarioEncontrado.nome}! ✅`);
                
                // Carregar página de viagens
                mudarPagina('viagens');
                
                // Forçar atualização das listas
                setTimeout(() => {
                    atualizarListaViagensIda();
                    atualizarListaViagensVolta();
                }, 200);
            } else {
                // Verificar se o usuário existe (para dar mensagem mais específica)
                const usuarioExiste = DB.administradores.some(a => a.usuario === usuarioInput);
                
                if (usuarioExiste) {
                    erroDiv.textContent = 'Senha incorreta!';
                } else {
                    erroDiv.textContent = 'Usuário não encontrado!';
                }
                erroDiv.classList.add('visivel');
            }
        }

        function fazerLogout() {
            if (confirm('Deseja sair do sistema?')) {
                DB.usuarioLogado = null;
                salvarBancoDados();
                
                // Mostrar modal de login
                document.getElementById('modalLogin').classList.add('active');
                document.getElementById('loginUsuario').value = '';
                document.getElementById('loginSenha').value = '';
                document.getElementById('erroLogin').classList.remove('visivel');
                
                // Atualizar interface
                atualizarInterfaceUsuario();
                
                // Resetar para página de viagens
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-viagens').classList.add('active');
                
                showToast('Logout realizado! 👋');
            }
        }

        function mostrarModalLogin() {
            if (DB.usuarioLogado) {
                if (confirm('Deseja fazer logout?')) {
                    fazerLogout();
                }
            } else {
                document.getElementById('modalLogin').classList.add('active');
                document.getElementById('loginUsuario').value = '';
                document.getElementById('loginSenha').value = '';
                document.getElementById('erroLogin').classList.remove('visivel');
            }
        }

        function atualizarInterfaceUsuario() {
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userNivel = document.getElementById('userNivel');
            const adminElements = document.querySelectorAll('.admin-only');
            
            if (DB.usuarioLogado) {
                userAvatar.textContent = DB.usuarioLogado.nome.charAt(0).toUpperCase();
                userName.textContent = DB.usuarioLogado.nome;
                userNivel.textContent = DB.usuarioLogado.nivel === 'admin' ? 'Administrador' : 'Usuário';
                
                // Mostrar/esconder elementos de admin
                adminElements.forEach(el => {
                    el.style.display = DB.usuarioLogado.nivel === 'admin' ? '' : 'none';
                });
            } else {
                userAvatar.textContent = '?';
                userName.textContent = 'Não logado';
                userNivel.textContent = '';
                adminElements.forEach(el => el.style.display = 'none');
                
                // Limpar listas quando não logado
                const listaIda = document.getElementById('listaViagensIda');
                const listaVolta = document.getElementById('listaViagensVolta');
                if (listaIda) listaIda.innerHTML = '<p style="text-align: center; opacity: 0.5;">Faça login para ver as viagens</p>';
                if (listaVolta) listaVolta.innerHTML = '<p style="text-align: center; opacity: 0.5;">Faça login para ver as viagens</p>';
            }
        }

        // ==================== VERIFICAÇÃO DE PERMISSÃO ====================
        function verificarPermissao() {
            if (!DB.usuarioLogado) {
                document.getElementById('modalLogin').classList.add('active');
                return false;
            }

        function verificarPermissaoAdmin() {
            if (!verificarPermissao()) return false;
            if (DB.usuarioLogado.nivel !== 'admin') {
                showToast('Acesso restrito a administradores!', 'error');
                mudarPagina('viagens');
                return false;
            }
            return true;
        }

        // ==================== NAVEGAÇÃO ====================
        function mudarPagina(pagina) {
            // Sempre permitir acesso à página de viagens se estiver logado
            if (!DB.usuarioLogado && pagina !== 'viagens') {
                document.getElementById('modalLogin').classList.add('active');
                return;
            }
            
            if (pagina === 'viagens' && !DB.usuarioLogado) {
                document.getElementById('modalLogin').classList.add('active');
                return;
            }
            
            if (!verificarPermissao()) return;
            
            // Verificar permissão para páginas administrativas
            const paginasAdmin = ['cadastro', 'veiculos', 'motoristas', 'admins'];
            if (paginasAdmin.includes(pagina) && !verificarPermissaoAdmin()) return;
            
            // Esconder todas as páginas
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            // Mostrar página selecionada
            const pageElement = document.getElementById(`page-${pagina}`);
            if (pageElement) {
                pageElement.classList.add('active');
            }
            
            // Atualizar menu ativo
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            const menuBtns = document.querySelectorAll('.menu-btn');
            menuBtns.forEach(btn => {
                const btnText = btn.textContent.toLowerCase();
                if (btnText.includes('viagens') && pagina === 'viagens') btn.classList.add('active');
                if (btnText.includes('nova viagem') && pagina === 'cadastro') btn.classList.add('active');
                if (btnText.includes('veículos') && pagina === 'veiculos') btn.classList.add('active');
                if (btnText.includes('motoristas') && pagina === 'motoristas') btn.classList.add('active');
                if (btnText.includes('admins') && pagina === 'admins') btn.classList.add('active');
            });
            
            // Carregar conteúdo específico
            if (pagina === 'viagens') {
                atualizarListaViagensIda();
                atualizarListaViagensVolta();
            }
            if (pagina === 'cadastro') carregarPaginaCadastro();
            if (pagina === 'veiculos') carregarPaginaVeiculos();
            if (pagina === 'motoristas') carregarPaginaMotoristas();
            if (pagina === 'admins') carregarPaginaAdmins();
        }

        function atualizarPreviaVolta() {
            const origemIda = document.getElementById('idaOrigem')?.value || '';
            const destinoIda = document.getElementById('idaDestino')?.value || '';
            
            const voltaOrigem = document.getElementById('voltaOrigem');
            const voltaDestino = document.getElementById('voltaDestino');
            
            if (voltaOrigem) voltaOrigem.value = destinoIda;
            if (voltaDestino) voltaDestino.value = origemIda;
        }

        function cadastrarViagemCompleta() {
            const idaOrigem = document.getElementById('idaOrigem').value.trim();
            const idaDestino = document.getElementById('idaDestino').value.trim();
            
            if (!idaOrigem || !idaDestino) {
                showToast('Preencha Origem e Destino!', 'error');
                return;
            }

            const viagemIda = {
                id: Date.now(),
                tipo: 'ida',
                origem: idaOrigem,
                destino: idaDestino,
                data: document.getElementById('idaData').value || new Date().toISOString(),
                veiculo: document.getElementById('idaVeiculo').value || 'Não definido',
                motorista: document.getElementById('idaMotorista').value || 'Não definido',
                observacoes: document.getElementById('idaObs').value.trim(),
                dataCadastro: new Date().toLocaleString('pt-BR'),
                criadoPor: DB.usuarioLogado ? DB.usuarioLogado.nome : 'Sistema'
            };

            const viagemVolta = {
                id: Date.now() + 1,
                tipo: 'volta',
                origem: idaDestino,
                destino: idaOrigem,
                data: document.getElementById('voltaData').value || new Date().toISOString(),
                veiculo: document.getElementById('voltaVeiculo').value || viagemIda.veiculo,
                motorista: document.getElementById('voltaMotorista').value || viagemIda.motorista,
                observacoes: document.getElementById('voltaObs').value.trim(),
                viagemIdaVinculada: viagemIda.id,
                dataCadastro: new Date().toLocaleString('pt-BR'),
                criadoPor: DB.usuarioLogado ? DB.usuarioLogado.nome : 'Sistema'
            };

            DB.viagensIda.unshift(viagemIda);
            DB.viagensVolta.unshift(viagemVolta);
            
            salvarBancoDados();
            
            carregarPaginaCadastro();
            showToast('✅ Viagem cadastrada com sucesso!');
        }

        // ==================== EDIÇÃO DE VIAGENS ====================
        function iniciarEdicao(tipo, id) {
            viagemEditando = { tipo, id };
            atualizarListaViagensIda();
            atualizarListaViagensVolta();
        }

        function cancelarEdicao() {
            viagemEditando = { tipo: null, id: null };
            atualizarListaViagensIda();
            atualizarListaViagensVolta();
        }

        function salvarEdicao(tipo, id) {
            const viagem = tipo === 'ida' 
                ? DB.viagensIda.find(v => v.id === id)
                : DB.viagensVolta.find(v => v.id === id);
            
            if (!viagem) {
                showToast('Viagem não encontrada!', 'error');
                return;
            }

            const origem = document.getElementById(`edit-origem-${id}`)?.value;
            const destino = document.getElementById(`edit-destino-${id}`)?.value;
            const data = document.getElementById(`edit-data-${id}`)?.value;
            const veiculo = document.getElementById(`edit-veiculo-${id}`)?.value;
            const motorista = document.getElementById(`edit-motorista-${id}`)?.value;
            const obs = document.getElementById(`edit-obs-${id}`)?.value;

            if (origem) viagem.origem = origem;
            if (destino) viagem.destino = destino;
            if (data) viagem.data = data;
            if (veiculo) viagem.veiculo = veiculo;
            if (motorista) viagem.motorista = motorista;
            if (obs !== undefined) viagem.observacoes = obs;

            if (tipo === 'ida' && origem && destino) {
                const voltaVinculada = DB.viagensVolta.find(v => v.viagemIdaVinculada === id);
                if (voltaVinculada) {
                    voltaVinculada.origem = destino;
                    voltaVinculada.destino = origem;
                }
            }

            salvarBancoDados();
            cancelarEdicao();
            showToast('✅ Viagem atualizada com sucesso!');
        }

        function excluirViagemIda(id) {
            if (confirm('Excluir esta viagem de ida? A volta vinculada também será excluída.')) {
                DB.viagensIda = DB.viagensIda.filter(v => v.id !== id);
                DB.viagensVolta = DB.viagensVolta.filter(v => v.viagemIdaVinculada !== id);
                salvarBancoDados();
                
                atualizarListaViagensIda();
                atualizarListaViagensVolta();
                showToast('Viagem excluída! 🗑️');
            }
        }

        function excluirViagemVolta(id) {
            if (confirm('Excluir esta viagem de volta?')) {
                DB.viagensVolta = DB.viagensVolta.filter(v => v.id !== id);
                salvarBancoDados();
                
                atualizarListaViagensVolta();
                showToast('Viagem excluída! 🗑️');

        function cadastrarVeiculo() {
            const modelo = document.getElementById('veiculoModelo').value.trim();
            const placa = document.getElementById('veiculoPlaca').value.trim().toUpperCase();
            const ano = document.getElementById('veiculoAno').value;

            if (!modelo || !placa) {
                showToast('Preencha Modelo e Placa!', 'error');
                return;

            DB.veiculos.push({ id: Date.now(), modelo, placa, ano });
            salvarBancoDados();
            carregarPaginaVeiculos();
            showToast('Veículo cadastrado! 🚗');

            tbody.innerHTML = DB.veiculos.map(v => `

                <div class="grid-2">
                    <div>
                        <h3>Cadastrar Motorista</h3>
                        <div class="form-group">
                            <label>👤 Nome Completo</label>
                            <input type="text" id="motoristaNome" placeholder="Nome do motorista">
                        </div>
                        <div class="form-group">
                            <label>📱 Telefone</label>
                            <input type="tel" id="motoristaTelefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="form-group">
                            <label>📧 E-mail</label>
                            <input type="email" id="motoristaEmail" placeholder="email@exemplo.com">
                        </div>
                        <div class="form-group">
                            <label>🚗 CNH</label>
                            <input type="text" id="motoristaCNH" placeholder="Número da CNH">
                        </div>
                        <div class="form-group">
                            <label>📅 Validade CNH</label>
                            <input type="date" id="motoristaValidadeCNH">
                        </div>
                        <div class="btn-group">
                            <button class="btn-primary" onclick="cadastrarMotorista()">💾 Cadastrar</button>
                            <button class="btn-outline" onclick="carregarPaginaMotoristas()">🗑️ Limpar</button>
                        </div>
                    </div>
                    <div>
                        <h3>Motoristas Cadastrados</h3>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>Nome</th><th>Telefone</th><th>CNH</th><th>Ações</th></tr>
                                </thead>
                                <tbody id="corpoTabelaMotoristas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            atualizarTabelaMotoristas();
        }

        function cadastrarMotorista() {
            const nome = document.getElementById('motoristaNome').value.trim();
            if (!nome) {
                showToast('Preencha o nome!', 'error');
                return;
            }

            DB.motoristas.push({
                id: Date.now(),
                nome,
                telefone: document.getElementById('motoristaTelefone').value.trim(),
                email: document.getElementById('motoristaEmail').value.trim(),
                cnh: document.getElementById('motoristaCNH').value.trim(),
                validadeCNH: document.getElementById('motoristaValidadeCNH').value
            });
            
            salvarBancoDados();
            carregarPaginaMotoristas();
            showToast('Motorista cadastrado! 👤');
        }

        function atualizarTabelaMotoristas() {
            const tbody = document.getElementById('corpoTabelaMotoristas');
            if (!tbody) return;
            
            if (DB.motoristas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.5;">Nenhum motorista cadastrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = DB.motoristas.map(m => `
                <tr>
                    <td>${m.nome}</td>
                    <td>${m.telefone || '-'}</td>
                    <td>${m.cnh || '-'}</td>
                    <td>
                        <button class="btn-danger" style="padding: 5px 10px; font-size: 0.8rem;" 
                                onclick="excluirMotorista(${m.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function excluirMotorista(id) {
            if (confirm('Excluir este motorista?')) {
                DB.motoristas = DB.motoristas.filter(m => m.id !== id);
                salvarBancoDados();
                carregarPaginaMotoristas();
                showToast('Motorista excluído! 🗑️');
            }
        }

        // ==================== PÁGINA DE ADMINS ====================
        function carregarPaginaAdmins() {
            const container = document.getElementById('adminsContainer');
            if (!container) return;
            
            container.innerHTML = `
                <h2>👥 Gerenciar Usuários</h2>
                <div class="grid-2">
                    <div>
                        <h3>Cadastrar Usuário</h3>
                        <div class="form-group">
                            <label>👤 Nome Completo</label>
                            <input type="text" id="adminNome" placeholder="Nome completo">
                        </div>
                        <div class="form-group">
                            <label>👤 Nome de Usuário (Login)</label>
                            <input type="text" id="adminUsuario" placeholder="Nome para login">
                            <div class="mensagem-erro" id="erroCadastroUsuario"></div>
                        </div>
                        <div class="form-group">
                            <label>📱 Telefone</label>
                            <input type="tel" id="adminTelefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="form-group">
                            <label>🔑 Senha</label>
                            <input type="password" id="adminSenha" placeholder="Mínimo 6 caracteres">
                            <div class="mensagem-erro" id="erroCadastroSenha"></div>
                        </div>
                        <div class="form-group">
                            <label>🔑 Confirmar Senha</label>
                            <input type="password" id="adminConfirmarSenha" placeholder="Repita a senha">
                            <div class="mensagem-erro" id="erroConfirmarSenha"></div>
                        </div>
                        <div class="form-group">
                            <label>🎫 Nível de Acesso</label>
                            <select id="adminNivel">
                                <option value="user">Usuário (apenas visualiza e envia WhatsApp)</option>
                                <option value="admin">Administrador (acesso total)</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button class="btn-primary" onclick="cadastrarAdmin()">💾 Cadastrar</button>
                            <button class="btn-outline" onclick="carregarPaginaAdmins()">🗑️ Limpar</button>
                        </div>
                    </div>
                    <div>
                        <h3>Usuários Cadastrados</h3>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>Nome</th><th>Usuário</th><th>Nível</th><th>Ações</th></tr>
                                </thead>
                                <tbody id="corpoTabelaAdmins"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            atualizarTabelaAdmins();
        }

        function cadastrarAdmin() {
            const nome = document.getElementById('adminNome').value.trim();
            const usuario = document.getElementById('adminUsuario').value.trim();
            const telefone = document.getElementById('adminTelefone').value.trim();
            const senha = document.getElementById('adminSenha').value;
            const confirmarSenha = document.getElementById('adminConfirmarSenha').value;
            const nivel = document.getElementById('adminNivel').value;
            
            document.querySelectorAll('.mensagem-erro').forEach(el => el.classList.remove('visivel'));
            
            let temErro = false;
            
            if (!nome || !usuario || !senha) {
                showToast('Preencha nome, usuário e senha!', 'error');
                return;
            }
            
            if (DB.administradores.some(a => a.usuario === usuario)) {
                document.getElementById('erroCadastroUsuario').textContent = 'Este nome de usuário já existe!';
                document.getElementById('erroCadastroUsuario').classList.add('visivel');
                temErro = true;
            }
            
            if (senha.length < 6) {
                document.getElementById('erroCadastroSenha').textContent = 'A senha deve ter no mínimo 6 caracteres!';
                document.getElementById('erroCadastroSenha').classList.add('visivel');
                temErro = true;
            }
            
            if (senha !== confirmarSenha) {
                document.getElementById('erroConfirmarSenha').textContent = 'As senhas não coincidem!';
                document.getElementById('erroConfirmarSenha').classList.add('visivel');
                temErro = true;
            }
            
            if (temErro) return;
            
            DB.administradores.push({
                id: Date.now(),
                nome,
                usuario,
                telefone,
                senha,
                nivel
            });
            
            salvarBancoDados();
            carregarPaginaAdmins();
            showToast('Usuário cadastrado com sucesso! ✅');
        }

        function atualizarTabelaAdmins() {
            const tbody = document.getElementById('corpoTabelaAdmins');
            if (!tbody) return;
            
            if (DB.administradores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.5;">Nenhum usuário cadastrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = DB.administradores.map(a => `
                <tr>
                    <td>${a.nome}</td>
                    <td>${a.usuario}</td>
                    <td><span class="badge ${a.nivel === 'admin' ? 'badge-admin' : 'badge-user'}">${a.nivel}</span></td>
                    <td>
                        ${DB.usuarioLogado && DB.usuarioLogado.id !== a.id ? `
                            <button class="btn-danger" style="padding: 5px 10px; font-size: 0.8rem;" 
                                    onclick="excluirAdmin(${a.id})">🗑️</button>
                        ` : '<span style="opacity: 0.5; font-size: 0.8rem;">Você</span>'}
                    </td>
                </tr>
            `).join('');
        }

        function excluirAdmin(id) {
            if (DB.administradores.length <= 1) {
                showToast('Não é possível excluir o último usuário!', 'error');
                return;
            }
            
            if (DB.usuarioLogado && id === DB.usuarioLogado.id) {
                showToast('Você não pode excluir seu próprio usuário!', 'error');
                return;
            }
            
            if (confirm('Excluir este usuário?')) {
                DB.administradores = DB.administradores.filter(a => a.id !== id);
                salvarBancoDados();
                carregarPaginaAdmins();
                showToast('Usuário excluído! 🗑️');
            }
        }

        // ==================== WHATSAPP ====================
        function enviarWhatsApp(id, tipo) {
            const viagem = tipo === 'ida' 
                ? DB.viagensIda.find(v => v.id === id)
                : DB.viagensVolta.find(v => v.id === id);
            
            if (!viagem) {
                showToast('Viagem não encontrada!', 'error');
                return;
            }

            const mensagem = `*Relatório de Viagem NS*%0A%0A` +
                             `🔹 *Tipo:* ${tipo.toUpperCase()}%0A` +
                             `📍 *Origem:* ${viagem.origem}%0A` +
                             `🎯 *Destino:* ${viagem.destino}%0A` +
                             `📅 *Data:* ${new Date(viagem.data).toLocaleString('pt-BR')}%0A` +
                             `🚗 *Veículo:* ${viagem.veiculo}%0A` +
                             `👤 *Motorista:* ${viagem.motorista}%0A` +
                             `${viagem.observacoes ? `📝 *Obs:* ${viagem.observacoes}%0A` : ''}` +
                             `✅ *Status:* Finalizada`;

            window.open(`https://wa.me/?text=${mensagem}`, '_blank');
        }

        // ==================== TOAST ====================
        function showToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', () => {
            carregarBancoDados();
            inicializarUsuariosPadrao();
            atualizarInterfaceUsuario();
            
            if (DB.usuarioLogado) {
                document.getElementById('modalLogin').classList.remove('active');
                mudarPagina('viagens');
            } else {
                document.getElementById('modalLogin').classList.add('active');
            }
        });

        // Permitir login com Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('modalLogin').classList.contains('active')) {
                fazerLogin();
            }
        });
    </script>
</body>
</html>

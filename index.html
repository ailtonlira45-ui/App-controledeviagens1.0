<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS - Sistema de Controle de Viagens</title>
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-dark: #8b0000;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        body {
            min-height: 100vh;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #8b0000, #ff0000);
            z-index: -1;
            animation: pulse 6s infinite alternate;
        }

        .ns-watermark {
            position: fixed;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            letter-spacing: 20px;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0% { background-color: #8b0000; opacity: 0.85; }
            100% { background-color: #ff4d4d; opacity: 0.95; }
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            height: 70px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(45deg, #fff, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .menu {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .menu-btn:hover, .menu-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .main-content {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
        }

        h2 { 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            color: rgba(255, 255, 255, 0.9);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.2);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        select {
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
        }

        select option { background: #333; color: white; }

        input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }

        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 25px; 
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-outline { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; 
        }

        button:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .card.editando {
            border-color: var(--warning);
            background: rgba(243, 156, 18, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-ida { background: #3498db; color: white; }
        .badge-volta { background: #9b59b6; color: white; }

        .rota {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .info-text {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .auto-badge {
            background: rgba(46, 204, 113, 0.3);
            border: 1px solid var(--success);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .linked-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 8px;
            display: inline-block;
        }

        .edit-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: var(--warning) !important;
            margin-top: 5px;
        }

        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:hover { background: rgba(255, 255, 255, 0.05); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            animation: slideIn 0.3s, slideOut 0.3s 2.5s forwards;
            z-index: 1000;
            font-weight: bold;
            color: white;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--info); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .log-container {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .log-entry {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            opacity: 0.6;
            font-size: 0.75rem;
        }

        .log-action {
            color: var(--info);
            font-weight: bold;
        }

        .log-user {
            color: var(--success);
        }

        .conexao-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .status-online {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 8px;
        }

        .status-offline {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            
            .nav {
                flex-wrap: wrap;
                height: auto;
                padding: 15px 0;
            }
            
            .menu {
                overflow-x: auto;
                width: 100%;
                margin-top: 10px;
                padding-bottom: 5px;
            }
            
            .user-info {
                margin-top: 10px;
                padding-left: 0;
                border-left: none;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="ns-watermark">NS</div>

    <!-- Header com Menu -->
    <header class="header">
        <nav class="nav">
            <div class="logo" onclick="mudarPagina('viagens')">NS</div>
            
            <div class="menu" id="menuPrincipal">
                <button class="menu-btn active" onclick="mudarPagina('viagens')">✈️ Viagens</button>
                <button class="menu-btn" onclick="mudarPagina('cadastro')">➕ Nova Viagem</button>
                <button class="menu-btn" onclick="mudarPagina('veiculos')">🚗 Veículos</button>
                <button class="menu-btn" onclick="mudarPagina('motoristas')">👤 Motoristas</button>
                <button class="menu-btn" onclick="mudarPagina('monitor')">📡 Monitor</button>
            </div>

            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div>
                    <div style="font-weight: bold; font-size: 0.9rem;" id="userName">Administrador</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;" id="userIP"></div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <div class="main-content">
        
        <!-- Página de Viagens -->
        <div id="page-viagens" class="page active">
            <div class="glass-container">
                <h2>📋 Histórico de Viagens</h2>
                
                <div class="grid-2">
                    <div>
                        <h3>🔵 Viagens de IDA</h3>
                        <div id="listaViagensIda">
                            <p style="text-align: center; opacity: 0.5;">Nenhuma viagem de ida</p>
                        </div>
                    </div>
                    
                    <div>
                        <h3>🟣 Viagens de VOLTA</h3>
                        <div id="listaViagensVolta">
                            <p style="text-align: center; opacity: 0.5;">Nenhuma viagem de volta</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Página de Cadastro -->
        <div id="page-cadastro" class="page">
            <div class="glass-container" id="cadastroContainer"></div>
        </div>

        <!-- Página de Veículos -->
        <div id="page-veiculos" class="page">
            <div class="glass-container" id="veiculosContainer"></div>
        </div>

        <!-- Página de Motoristas -->
        <div id="page-motoristas" class="page">
            <div class="glass-container" id="motoristasContainer"></div>
        </div>

        <!-- Página de Monitor -->
        <div id="page-monitor" class="page">
            <div class="glass-container">
                <h2>📡 Monitor do Sistema</h2>
                
                <div class="grid-2">
                    <!-- Conexões Ativas -->
                    <div>
                        <h3>🖥️ Conexões Ativas</h3>
                        <div id="conexoesAtivas">
                            <p style="text-align: center; opacity: 0.5;">Carregando...</p>
                        </div>
                    </div>
                    
                    <!-- Log de Atividades -->
                    <div>
                        <h3>📝 Log de Atividades</h3>
                        <div class="log-container" id="logAtividades">
                            <p style="text-align: center; opacity: 0.5;">Nenhuma atividade registrada</p>
                        </div>
                        <button class="btn-outline" onclick="limparLog()" style="margin-top: 10px; width: 100%;">
                            🗑️ Limpar Log
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== BANCO DE DADOS ====================
        const DB_KEY = 'ns_sistema_viagens_db_v3';
        const LOG_KEY = 'ns_sistema_log_v1';
        const CONEXOES_KEY = 'ns_sistema_conexoes_v1';
        
        let DB = {
            viagensIda: [],
            viagensVolta: [],
            veiculos: [],
            motoristas: []
        };
        
        let viagemEditando = { tipo: null, id: null };
        let usuarioAtual = {
            nome: 'Administrador',
            ip: 'Carregando...'
        };

        // ==================== FUNÇÕES DE REDE ====================
        async function obterIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                usuarioAtual.ip = data.ip;
                document.getElementById('userIP').textContent = 'IP: ' + data.ip;
                return data.ip;
            } catch (e) {
                usuarioAtual.ip = 'IP não detectado';
                document.getElementById('userIP').textContent = 'IP: Local';
                return 'local';
            }
        }

        function gerarIdConexao() {
            return 'conn_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // ==================== PERSISTÊNCIA ====================
        function carregarBancoDados() {
            try {
                const dadosSalvos = localStorage.getItem(DB_KEY);
                if (dadosSalvos) {
                    const dados = JSON.parse(dadosSalvos);
                    DB.viagensIda = dados.viagensIda || [];
                    DB.viagensVolta = dados.viagensVolta || [];
                    DB.veiculos = dados.veiculos || [];
                    DB.motoristas = dados.motoristas || [];
                }
            } catch (e) {
                console.error('Erro ao carregar banco de dados:', e);
            }
        }

        function salvarBancoDados() {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(DB));
            } catch (e) {
                console.error('Erro ao salvar banco de dados:', e);
                showToast('Erro ao salvar dados!', 'error');
            }
        }

        // ==================== SISTEMA DE LOG ====================
        function registrarLog(acao, detalhes = '') {
            const logs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
            
            const log = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('pt-BR'),
                acao: acao,
                detalhes: detalhes,
                ip: usuarioAtual.ip,
                usuario: usuarioAtual.nome
            };
            
            logs.unshift(log);
            
            // Manter apenas os últimos 100 logs
            if (logs.length > 100) {
                logs.pop();
            }
            
            localStorage.setItem(LOG_KEY, JSON.stringify(logs));
            atualizarLogAtividades();
        }

        function atualizarLogAtividades() {
            const container = document.getElementById('logAtividades');
            if (!container) return;
            
            const logs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
            
            if (logs.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.5;">Nenhuma atividade registrada</p>';
                return;
            }
            
            container.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <div>
                        <span class="log-action">${log.acao}</span>
                        ${log.detalhes ? ` - ${log.detalhes}` : ''}
                    </div>
                    <div style="text-align: right;">
                        <div class="log-user">${log.usuario || 'Sistema'}</div>
                        <div class="log-time">${log.timestamp} | IP: ${log.ip || 'N/A'}</div>
                    </div>
                </div>
            `).join('');
        }

        function limparLog() {
            if (confirm('Limpar todo o log de atividades?')) {
                localStorage.setItem(LOG_KEY, JSON.stringify([]));
                atualizarLogAtividades();
                showToast('Log limpo! 🗑️');
            }
        }

        // ==================== SISTEMA DE CONEXÕES ====================
        const minhaConexao = {
            id: gerarIdConexao(),
            ip: 'Carregando...',
            inicio: new Date().toLocaleString('pt-BR'),
            ultimaAtividade: new Date().toLocaleString('pt-BR'),
            pagina: 'viagens'
        };

        function atualizarConexoes() {
            const conexoes = JSON.parse(localStorage.getItem(CONEXOES_KEY)) || [];
            
            // Atualizar ou adicionar minha conexão
            const minhaConnIndex = conexoes.findIndex(c => c.id === minhaConexao.id);
            minhaConexao.ip = usuarioAtual.ip;
            minhaConexao.ultimaAtividade = new Date().toLocaleString('pt-BR');
            
            if (minhaConnIndex >= 0) {
                conexoes[minhaConnIndex] = minhaConexao;
            } else {
                conexoes.push(minhaConexao);
            }
            
            // Remover conexões inativas (mais de 5 minutos)
            const agora = Date.now();
            const conexoesAtivas = conexoes.filter(c => {
                const ultimaAtividade = new Date(c.ultimaAtividade).getTime();
                return (agora - ultimaAtividade) < 300000; // 5 minutos
            });
            
            localStorage.setItem(CONEXOES_KEY, JSON.stringify(conexoesAtivas));
            exibirConexoesAtivas();
        }

        function exibirConexoesAtivas() {
            const container = document.getElementById('conexoesAtivas');
            if (!container) return;
            
            const conexoes = JSON.parse(localStorage.getItem(CONEXOES_KEY)) || [];
            
            if (conexoes.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.5;">Nenhuma conexão ativa</p>';
                return;
            }
            
            container.innerHTML = conexoes.map(c => `
                <div class="conexao-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <span class="status-online"></span>
                            <strong>IP: ${c.ip || 'Desconhecido'}</strong>
                            ${c.id === minhaConexao.id ? '<span style="color: var(--success); margin-left: 8px;">(Você)</span>' : ''}
                        </div>
                        <div style="text-align: right; font-size: 0.8rem; opacity: 0.7;">
                            <div>Início: ${c.inicio}</div>
                            <div>Última: ${c.ultimaAtividade}</div>
                        </div>
                    </div>
                    <div style="margin-top: 5px; font-size: 0.8rem; opacity: 0.6;">
                        Página: ${c.pagina || 'N/A'}
                    </div>
                </div>
            `).join('');
        }

        // Atualizar conexões a cada 10 segundos
        setInterval(atualizarConexoes, 10000);

        // ==================== NAVEGAÇÃO ====================
        function mudarPagina(pagina) {
            // Esconder todas as páginas
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            // Mostrar página selecionada
            const pageElement = document.getElementById(`page-${pagina}`);
            if (pageElement) {
                pageElement.classList.add('active');
            }
            
            // Atualizar menu ativo
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            const menuBtns = document.querySelectorAll('.menu-btn');
            menuBtns.forEach(btn => {
                const btnText = btn.textContent.toLowerCase();
                if (btnText.includes('viagens') && pagina === 'viagens') btn.classList.add('active');
                if (btnText.includes('nova viagem') && pagina === 'cadastro') btn.classList.add('active');
                if (btnText.includes('veículos') && pagina === 'veiculos') btn.classList.add('active');
                if (btnText.includes('motoristas') && pagina === 'motoristas') btn.classList.add('active');
                if (btnText.includes('monitor') && pagina === 'monitor') btn.classList.add('active');
            });
            
            // Atualizar página atual na conexão
            minhaConexao.pagina = pagina;
            atualizarConexoes();
            
            // Registrar log de navegação
            registrarLog('Navegação', `Acessou a página: ${pagina}`);
            
            // Carregar conteúdo específico
            if (pagina === 'viagens') {
                atualizarListaViagensIda();
                atualizarListaViagensVolta();
            }
            if (pagina === 'cadastro') carregarPaginaCadastro();
            if (pagina === 'veiculos') carregarPaginaVeiculos();
            if (pagina === 'motoristas') carregarPaginaMotoristas();
            if (pagina === 'monitor') {
                atualizarLogAtividades();
                exibirConexoesAtivas();
            }
        }

        // ==================== PÁGINA DE CADASTRO ====================
        function carregarPaginaCadastro() {
            const container = document.getElementById('cadastroContainer');
            if (!container) return;
            
            container.innerHTML = `

            const voltaDestino = document.getElementById('voltaDestino');

        function cadastrarViagemCompleta() {
            const idaOrigem = document.getElementById('idaOrigem').value.trim();
            const idaDestino = document.getElementById('idaDestino').value.trim();
            
            if (!idaOrigem || !idaDestino) {
                showToast('Preencha Origem e Destino!', 'error');
                return;
            }

            const viagemIda = {
                id: Date.now(),
                tipo: 'ida',
                origem: idaOrigem,
                destino: idaDestino,
                data: document.getElementById('idaData').value || new Date().toISOString(),
                veiculo: document.getElementById('idaVeiculo').value || 'Não definido',
                motorista: document.getElementById('idaMotorista').value || 'Não definido',
                observacoes: document.getElementById('idaObs').value.trim(),
                dataCadastro: new Date().toLocaleString('pt-BR'),
                criadoPor: usuarioAtual.nome,
                ipCriador: usuarioAtual.ip
            };

            const viagemVolta = {
                id: Date.now() + 1,
                tipo: 'volta',
                origem: idaDestino,
                destino: idaOrigem,
                data: document.getElementById('voltaData').value || new Date().toISOString(),
                veiculo: document.getElementById('voltaVeiculo').value || viagemIda.veiculo,
                motorista: document.getElementById('voltaMotorista').value || viagemIda.motorista,
                observacoes: document.getElementById('voltaObs').value.trim(),
                viagemIdaVinculada: viagemIda.id,
                dataCadastro: new Date().toLocaleString('pt-BR'),
                criadoPor: usuarioAtual.nome,
                ipCriador: usuarioAtual.ip
            };

            DB.viagensIda.unshift(viagemIda);
            DB.viagensVolta.unshift(viagemVolta);
            
            salvarBancoDados();
            
            registrarLog('Cadastro de Viagem', `Ida: ${idaOrigem} ➔ ${idaDestino}`);

        // ==================== EDIÇÃO DE VIAGENS ====================
        function iniciarEdicao(tipo, id) {
            viagemEditando = { tipo, id };
            atualizarListaViagensIda();
            atualizarListaViagensVolta();
            registrarLog('Edição de Viagem', `Iniciou edição de viagem ${tipo} #${id}`);
        }

        function cancelarEdicao() {
            viagemEditando = { tipo: null, id: null };
            atualizarListaViagensIda();
            atualizarListaViagensVolta();
        }

        function salvarEdicao(tipo, id) {
            const viagem = tipo === 'ida' 
                ? DB.viagensIda.find(v => v.id === id)
                : DB.viagensVolta.find(v => v.id === id);
            
            if (!viagem) {
                showToast('Viagem não encontrada!', 'error');
                return;
            }

            const origem = document.getElementById(`edit-origem-${id}`)?.value;
            const destino = document.getElementById(`edit-destino-${id}`)?.value;
            const data = document.getElementById(`edit-data-${id}`)?.value;
            const veiculo = document.getElementById(`edit-veiculo-${id}`)?.value;
            const motorista = document.getElementById(`edit-motorista-${id}`)?.value;
            const obs = document.getElementById(`edit-obs-${id}`)?.value;

            if (origem) viagem.origem = origem;
            if (destino) viagem.destino = destino;
            if (data) viagem.data = data;
            if (veiculo) viagem.veiculo = veiculo;
            if (motorista) viagem.motorista = motorista;
            if (obs !== undefined) viagem.observacoes = obs;

            if (tipo === 'ida' && origem && destino) {
                const voltaVinculada = DB.viagensVolta.find(v => v.viagemIdaVinculada === id);
                if (voltaVinculada) {
                    voltaVinculada.origem = destino;
                    voltaVinculada.destino = origem;
                }
            }

            salvarBancoDados();
            registrarLog('Edição de Viagem', `Salvou edição de viagem ${tipo} #${id}: ${viagem.origem} ➔ ${viagem.destino}`);
            cancelarEdicao();
            showToast('✅ Viagem atualizada com sucesso!');
        }

        function excluirViagemIda(id) {
            const viagem = DB.viagensIda.find(v => v.id === id);
            if (confirm('Excluir esta viagem de ida? A volta vinculada também será excluída.')) {
                DB.viagensIda = DB.viagensIda.filter(v => v.id !== id);
                DB.viagensVolta = DB.viagensVolta.filter(v => v.viagemIdaVinculada !== id);
                salvarBancoDados();
                
                registrarLog('Exclusão de Viagem', `Excluiu viagem de ida: ${viagem.origem} ➔ ${viagem.destino}`);
                
                atualizarListaViagensIda();
                atualizarListaViagensVolta();
                showToast('Viagem excluída! 🗑️');
            }
        }

                cnh: document.getElementById('motoristaCNH').value.trim(),
                validadeCNH: document.getElementById('motoristaValidadeCNH').value
            });
            
            salvarBancoDados();
            
            registrarLog('Cadastro de Motorista', nome);
            
            carregarPaginaMotoristas();
            showToast('Motorista cadastrado! 👤');
        }

        function atualizarTabelaMotoristas() {
            const tbody = document.getElementById('corpoTabelaMotoristas');
            if (!tbody) return;
            
            if (DB.motoristas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.5;">Nenhum motorista cadastrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = DB.motoristas.map(m => `
                <tr>
                    <td>${m.nome}</td>
                    <td>${m.telefone || '-'}</td>
                    <td>${m.cnh || '-'}</td>
                    <td>
                        <button class="btn-danger" style="padding: 5px 10px; font-size: 0.8rem;" 
                                onclick="excluirMotorista(${m.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function excluirMotorista(id) {
            const motorista = DB.motoristas.find(m => m.id === id);
            if (confirm('Excluir este motorista?')) {
                DB.motoristas = DB.motoristas.filter(m => m.id !== id);
                salvarBancoDados();
                
                registrarLog('Exclusão de Motorista', motorista.nome);
                
                carregarPaginaMotoristas();
                showToast('Motorista excluído! 🗑️');
            }
        }

        // ==================== WHATSAPP ====================
        function enviarWhatsApp(id, tipo) {
            const viagem = tipo === 'ida' 
                ? DB.viagensIda.find(v => v.id === id)
                : DB.viagensVolta.find(v => v.id === id);
            
            if (!viagem) {
                showToast('Viagem não encontrada!', 'error');
                return;
            }

            registrarLog('Envio WhatsApp', `Viagem ${tipo}: ${viagem.origem} ➔ ${viagem.destino}`);

            const mensagem = `*Relatório de Viagem NS*%0A%0A` +
                             `🔹 *Tipo:* ${tipo.toUpperCase()}%0A` +
                             `📍 *Origem:* ${viagem.origem}%0A` +
                             `🎯 *Destino:* ${viagem.destino}%0A` +
                             `📅 *Data:* ${new Date(viagem.data).toLocaleString('pt-BR')}%0A` +
                             `🚗 *Veículo:* ${viagem.veiculo}%0A` +
                             `👤 *Motorista:* ${viagem.motorista}%0A` +
                             `${viagem.observacoes ? `📝 *Obs:* ${viagem.observacoes}%0A` : ''}` +
                             `✅ *Status:* Finalizada`;

            window.open(`https://wa.me/?text=${mensagem}`, '_blank');
        }

        // ==================== TOAST ====================
        function showToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== INICIALIZAÇÃO ====================
        async function inicializar() {
            carregarBancoDados();
            
            // Obter IP
            await obterIP();
            
            // Atualizar interface
            atualizarInterfaceUsuario();
            
            // Registrar conexão
            atualizarConexoes();
            
            // Registrar log de acesso
            registrarLog('Acesso ao Sistema', `IP: ${usuarioAtual.ip}`);
            
            // Carregar página inicial
            mudarPagina('viagens');
        }

        function atualizarInterfaceUsuario() {
            document.getElementById('userName').textContent = usuarioAtual.nome;
            document.getElementById('userIP').textContent = 'IP: ' + usuarioAtual.ip;
        }

        document.addEventListener('DOMContentLoaded', inicializar);

        // Atualizar atividade periodicamente
        setInterval(() => {
            minhaConexao.ultimaAtividade = new Date().toLocaleString('pt-BR');
            atualizarConexoes();
        }, 30000);
    </script>
</body>
</html>
